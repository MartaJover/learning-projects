version: "3.8"

services:
  db:
    image: postgres:16
    container_name: poc_db
    restart: always

    # bootstrap vars for first-run only
    environment:
      POSTGRES_USER:   user
      POSTGRES_PASSWORD: password
      POSTGRES_DB:     mydb

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  